name: Deploy Microservices on Kubernetes with Helm

on:
  push:
    branches:
      - main

jobs:
  helm-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. Build chaque microservice
      - name: Build Config Service
        run: mvn clean package -DskipTests -f ./config-service/pom.xml

      - name: Build Discovery Service
        run: mvn clean package -DskipTests -f ./discovery-service/pom.xml

      - name: Build Gateway Service
        run: mvn clean package -DskipTests -f ./gateway-service/pom.xml

      - name: Build Catalogue Service
        run: mvn clean package -DskipTests -f ./catalogue-service/pom.xml

      - name: Build Commande Service
        run: mvn clean package -DskipTests -f ./commande-service/pom.xml

      - name: Build Paiement Service
        run: mvn clean package -DskipTests -f ./paiement-service/pom.xml

      # 4. Build Docker images
      - name: Build Docker Images
        run: |
          docker build -t mouloudbouderka/config-service:latest ./config-service
          docker build -t mouloudbouderka/discovery-service:latest ./discovery-service
          docker build -t mouloudbouderka/gateway-service:latest ./gateway-service
          docker build -t mouloudbouderka/catalogue-service:latest ./catalogue-service
          docker build -t mouloudbouderka/commande-service:latest ./commande-service
          docker build -t mouloudbouderka/paiement-service:latest ./paiement-service

      # 5. Login Docker Hub
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Push Docker images sur Docker Hub
      - name: Push Docker Images
        run: |
          docker push mouloudbouderka/config-service:latest
          docker push mouloudbouderka/discovery-service:latest
          docker push mouloudbouderka/gateway-service:latest
          docker push mouloudbouderka/catalogue-service:latest
          docker push mouloudbouderka/commande-service:latest
          docker push mouloudbouderka/paiement-service:latest

      # 7. Setup Helm
      - name: Setup Helm
        uses: azure/setup-helm@v3

      # 8. Configurer kubectl avec le secret KUBE_CONFIG_DATA
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > $HOME/.kube/config

      # 9. Test connexion Kubernetes
      - name: Test kubectl connection
        run: kubectl get nodes

      # 10. Deploy services avec Helm
      - name: Deploy Config Service
        run: helm upgrade --install config-service ./charts/config-service

      - name: Deploy Discovery Service
        run: helm upgrade --install discovery-service ./charts/discovery-service

      - name: Deploy Gateway Service
        run: helm upgrade --install gateway-service ./charts/gateway-service

      - name: Deploy Catalogue Service
        run: helm upgrade --install catalogue-service ./charts/catalogue-service

      - name: Deploy Commande Service
        run: helm upgrade --install commande-service ./charts/commande-service

      - name: Deploy Paiement Service
        run: helm upgrade --install paiement-service ./charts/paiement-service
